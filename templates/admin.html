<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KnowledgeLM Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

  <div id="login-view">
    <h2>Admin login</h2>
    <form id="login-form">
      <input id="login-email" type="email" placeholder="Email" required>
      <input id="login-password" type="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
    <p id="login-error" class="error"></p>
  </div>

  <div id="dashboard-view" style="display:none">
    <div class="top-bar">
      <h2>KnowledgeLM Admin</h2>
      <button id="logout-btn">Log out</button>
    </div>

    <section>
      <h3>Categories</h3>
      <form id="category-form">
        <input id="category-name" type="text" placeholder="New category name" required>
        <button type="submit">Add</button>
      </form>
      <ul id="category-list"></ul>
    </section>

    <section>
      <h3>Upload document</h3>
      <form id="upload-form">
        <input id="upload-file" type="file" accept=".md,.markdown" required>
        <select id="upload-category"></select>
        <button type="submit">Upload</button>
      </form>
    </section>

    <section>
      <h3>Documents</h3>
      <table id="document-table">
        <thead><tr><th>Title</th><th>Status</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script>window.TENANT_SLUG = {{ tenant_slug | tojson }};</script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
