<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>
  <div class="console">

    <header class="console-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">S</span>
        <div class="brand-text">
          <span class="brand-name">Support</span>
          <span class="brand-status"><span class="status-dot"></span>Usually replies in seconds</span>
        </div>
      </div>
      <span class="ai-tag">AI&nbsp;assisted</span>
    </header>

    <main id="chat-log" class="thread" aria-live="polite">
      <div class="welcome" id="welcome">
        <p class="welcome-title">Hi, how can I help?</p>
        <p class="welcome-body">Ask anything about your account, setup, or billing — answers are pulled straight from our docs.</p>
        <div class="suggestions" id="suggestions">
          <button type="button" class="chip">What do you offer?</button>
          <button type="button" class="chip">Do you provide customized solutions?</button>
          <button type="button" class="chip">How do I contact support?</button>
        </div>
      </div>
    </main>

    <form id="chat-form" class="composer">
      <textarea id="chat-input" class="composer-input" placeholder="Type your question…" rows="1" autocomplete="off" aria-label="Message"></textarea>
      <button type="submit" class="composer-send" aria-label="Send message">
        <svg viewBox="0 0 20 20" width="18" height="18" fill="none" aria-hidden="true">
          <path d="M2.5 10L17.5 3L12 17.5L9.5 11.5L2.5 10Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
    </form>
    <p class="disclaimer">Answers are AI-generated from our knowledge base and may occasionally be wrong.</p>

  </div>
  <script>window.TENANT_SLUG = {{ tenant_slug | tojson }};</script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
